<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vây Chiếm Online - Name & Result Update</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --p1: #ff4757; --p2: #2f3542; --primary: #2ed573; --danger: #ff4757; --gold: #f1c40f; --bg: #f1f2f6; }
        body { margin: 0; display: flex; flex-direction: column; align-items: center; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #2f3542; overflow: hidden; height: 100vh; }
        .container { width: 100%; max-width: 450px; padding: 10px; box-sizing: border-box; }
        .panel { background: white; padding: 15px; border-radius: 16px; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        input { padding: 12px; border-radius: 10px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; margin-bottom: 10px; outline: none; font-size: 16px; }
        button.main-btn { border: none; border-radius: 10px; cursor: pointer; font-weight: bold; background: var(--primary); color: white; padding: 14px; width: 100%; font-size: 16px; transition: 0.2s; }
        
        /* AVATAR & INFO */
        .avatar-section { display: flex; flex-direction: column; align-items: center; margin-bottom: 15px; }
        .avatar-circle { width: 70px; height: 70px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 28px; overflow: hidden; border: 3px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }

        /* BẢNG ĐIỂM TRẬN ĐẤU */
        .game-score-container { display: flex; gap: 15px; margin-bottom: 15px; justify-content: center; }
        .player-score-box { flex: 1; background: white; padding: 10px; border-radius: 15px; border: 3px solid transparent; display: flex; flex-direction: column; align-items: center; min-width: 120px; transition: 0.3s; }
        .player-score-box.active { border-color: var(--primary); background: #f0fff4; transform: scale(1.05); }
        .player-name-label { font-size: 12px; font-weight: bold; color: #555; margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; text-align: center; }
        .score-num { font-size: 26px; font-weight: 900; }

        #world-messages { height: 180px; overflow-y: auto; padding: 10px; font-size: 13px; background: #fdfdfd; border-radius: 8px; border: 1px solid #eee; }
        canvas { background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; touch-action: none; }

        /* THÔNG BÁO THẮNG THUA */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 3000; backdrop-filter: blur(5px); }
    </style>
</head>
<body>

<div id="auth-screen" style="position:fixed; inset:0; background:var(--bg); z-index:2000; display:flex; align-items:center; justify-content:center;">
    <div class="panel" style="width:300px; text-align:center;">
        <h2>🎮 Vây Chiếm</h2>
        <input type="text" id="auth-user" placeholder="Tên đăng nhập">
        <input type="password" id="auth-pass" placeholder="Mật khẩu">
        <button class="main-btn" onclick="auth('login')">VÀO GAME</button>
        <button onclick="auth('reg')" style="background:none; border:none; margin-top:10px; color:#666; cursor:pointer; font-size:12px">Đăng ký mới</button>
    </div>
</div>

<div id="menu-screen" style="display:none; width:100%; max-width:360px; padding:20px; flex-direction:column;">
    <div class="avatar-section">
        <div id="avatar-display" class="avatar-circle" onclick="document.getElementById('file-input').click()">?</div>
        <input type="file" id="file-input" hidden accept="image/*" onchange="previewAvt(this)">
        <h3 id="display-username" style="margin: 10px 0 0 0">Người chơi</h3>
    </div>

    <div style="display: flex; gap: 10px; width: 100%; margin-bottom: 10px;">
        <div class="panel" style="flex:1; text-align:center; border-bottom:4px solid var(--primary)">Thắng: <b id="stat-win">0</b></div>
        <div class="panel" style="flex:1; text-align:center; border-bottom:4px solid var(--danger)">Thua: <b id="stat-lose">0</b></div>
    </div>

    <div class="panel">
        <div style="font-size:11px; margin-bottom:5px">ID Của Bạn: <b id="my-peer-id" style="color:red">...</b></div>
        <input type="text" id="menu-target-id" placeholder="Nhập ID đối thủ">
        <button class="main-btn" onclick="connectAndPlay()">THÁCH ĐẤU</button>
    </div>

    <div class="panel" style="padding:10px">
        <div id="world-messages"></div>
        <div style="display:flex; gap:5px; margin-top:8px">
            <input type="text" id="world-input" placeholder="Chat thế giới..." style="margin:0; font-size:13px" onkeypress="if(event.key==='Enter') sendWorldMsg()">
            <button onclick="sendWorldMsg()" style="background:var(--primary); color:white; border:none; border-radius:8px; padding:0 10px; cursor:pointer">Gửi</button>
        </div>
    </div>
</div>

<div id="main-game-area" style="display:none; width: 100%; max-width: 450px;">
    <div class="container">
        <div class="panel" style="display:flex; justify-content: space-between; align-items: center; padding: 10px;">
            <div id="game-status" style="font-weight:bold; color:var(--primary);">Đang chờ...</div>
            <button onclick="confirmExit()" style="border:none; background:#eee; padding:5px 12px; border-radius:8px; cursor:pointer">Đầu hàng</button>
        </div>

        <div class="game-score-container">
            <div id="my-score-box" class="player-score-box">
                <div id="my-avt-game" class="avatar-circle" style="width:40px; height:40px; font-size:18px"></div>
                <div id="my-name-display" class="player-name-label">Bạn</div>
                <div id="my-score-val" class="score-num">0</div>
            </div>
            <div id="peer-score-box" class="player-score-box">
                <div id="peer-avt-game" class="avatar-circle" style="width:40px; height:40px; font-size:18px"></div>
                <div id="peer-name-display" class="player-name-label">Đối thủ</div>
                <div id="peer-score-val" class="score-num">0</div>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>
</div>

<div id="result-overlay" class="overlay">
    <div class="panel" style="width: 300px; text-align: center;">
        <h1 id="result-title" style="margin: 0 0 10px 0; font-size: 32px;">🏆</h1>
        <h2 id="result-text" style="margin-bottom: 5px;">BẠN THẮNG</h2>
        <p id="result-score" style="font-size: 20px; font-weight: bold; color: #666; margin-bottom: 20px;">20 - 15</p>
        <button class="main-btn" onclick="location.reload()">QUAY LẠI MENU</button>
    </div>
</div>

<script>
    const mqttClient = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
    const WORLD_TOPIC = "vay_chiem_global_chat_v2";
    let peer, conn, myName, peerName = "Đối thủ", myAvt;
    let GRID = 8, currentPlayer = 1, scores = {1:0, 2:0}, gameActive = false, myRole;
    let hLines, vLines, squares;

    mqttClient.on('connect', () => mqttClient.subscribe(WORLD_TOPIC));
    mqttClient.on('message', (t, m) => {
        const d = JSON.parse(m.toString());
        const box = document.getElementById('world-messages');
        box.innerHTML += `<div><b>${d.user}:</b> ${d.text}</div>`;
        box.scrollTop = box.scrollHeight;
    });

    function sendWorldMsg() {
        const i = document.getElementById('world-input');
        if(i.value.trim()) { mqttClient.publish(WORLD_TOPIC, JSON.stringify({user:myName, text:i.value})); i.value=""; }
    }

    function auth(type) {
        const u = document.getElementById('auth-user').value.trim(), p = document.getElementById('auth-pass').value.trim();
        if(!u || !p) return alert("Điền đủ thông tin!");
        let db = JSON.parse(localStorage.getItem('game_db') || '{}');
        if(type === 'reg') {
            if(db[u]) return alert("Tên đã tồn tại!");
            db[u] = {pass:p, win:0, lose:0, avt: u.charAt(0).toUpperCase()};
            localStorage.setItem('game_db', JSON.stringify(db));
            alert("Đăng ký thành công!");
        } else {
            if(db[u]?.pass === p) { sessionStorage.setItem('user', u); showMenu(); }
            else alert("Sai tài khoản/mật khẩu!");
        }
    }

    function showMenu() {
        myName = sessionStorage.getItem('user');
        let db = JSON.parse(localStorage.getItem('game_db') || '{}');
        let data = db[myName];
        myAvt = data.avt;
        document.getElementById('display-username').innerText = myName;
        document.getElementById('stat-win').innerText = data.win;
        document.getElementById('stat-lose').innerText = data.lose;
        updateAvtUI('avatar-display', myAvt);
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('menu-screen').style.display = 'flex';
        if(!peer) initPeer();
    }

    function previewAvt(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                myAvt = e.target.result;
                updateAvtUI('avatar-display', myAvt);
                let db = JSON.parse(localStorage.getItem('game_db') || '{}');
                db[myName].avt = myAvt;
                localStorage.setItem('game_db', JSON.stringify(db));
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function updateAvtUI(id, src) {
        const el = document.getElementById(id);
        if(src.length > 2) { el.innerHTML = `<img src="${src}">`; el.style.background = "none"; }
        else { el.innerText = src; el.style.background = "var(--primary)"; }
    }

    function initPeer() {
        peer = new Peer(Math.floor(10000 + Math.random()*89999).toString());
        peer.on('open', id => document.getElementById('my-peer-id').innerText = id);
        peer.on('connection', c => { conn = c; myRole = 'host'; setupConn(); });
    }

    function connectAndPlay() {
        const id = document.getElementById('menu-target-id').value.trim();
        if(!id) return alert("Nhập ID đối thủ!");
        conn = peer.connect(id); myRole = 'guest'; setupConn();
    }

    function setupConn() {
        conn.on('open', () => {
            conn.send({type: 'init', name: myName, avt: myAvt});
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('main-game-area').style.display = 'block';
            document.getElementById('my-name-display').innerText = myName;
            updateAvtUI('my-avt-game', myAvt);
            resetGame(); initCanvas(); gameActive = true;
        });
        conn.on('data', d => {
            if(d.type === 'init') {
                peerName = d.name;
                document.getElementById('peer-name-display').innerText = peerName;
                updateAvtUI('peer-avt-game', d.avt);
            }
            if(d.type === 'move') handleMove(d.r, d.c, d.isH);
            if(d.type === 'surrender') endGame(true);
        });
    }

    // --- GAME ENGINE ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let SIZE, OFFSET;

    function resetGame() {
        hLines = Array(GRID+1).fill().map(()=>Array(GRID).fill(false));
        vLines = Array(GRID).fill().map(()=>Array(GRID+1).fill(false));
        squares = Array(GRID).fill().map(()=>Array(GRID).fill(0));
        scores = {1:0, 2:0}; currentPlayer = 1; updateUI();
    }

    function initCanvas() {
        const w = Math.min(canvas.parentElement.clientWidth - 20, 430);
        canvas.width = canvas.height = w * devicePixelRatio;
        ctx.scale(devicePixelRatio, devicePixelRatio);
        SIZE = (w * 0.9) / GRID; OFFSET = (w - SIZE * GRID) / 2;
        draw();
    }

    function draw() {
        const w = canvas.width / devicePixelRatio; ctx.clearRect(0,0,w,w);
        for(let r=0; r<GRID; r++) for(let c=0; c<GRID; c++) if(squares[r][c]) {
            ctx.fillStyle = squares[r][c]===1 ? 'rgba(255,71,87,0.2)' : 'rgba(47,53,66,0.2)';
            ctx.fillRect(c*SIZE+OFFSET, r*SIZE+OFFSET, SIZE, SIZE);
        }
        ctx.lineWidth = 2;
        for(let r=0; r<=GRID; r++) for(let c=0; c<GRID; c++) {
            ctx.strokeStyle = hLines[r][c] ? "#333" : "#eee";
            ctx.beginPath(); ctx.moveTo(c*SIZE+OFFSET, r*SIZE+OFFSET); ctx.lineTo((c+1)*SIZE+OFFSET, r*SIZE+OFFSET); ctx.stroke();
        }
        for(let r=0; r<GRID; r++) for(let c=0; c<=GRID; c++) {
            ctx.strokeStyle = vLines[r][c] ? "#333" : "#eee";
            ctx.beginPath(); ctx.moveTo(c*SIZE+OFFSET, r*SIZE+OFFSET); ctx.lineTo(c*SIZE+OFFSET, (r+1)*SIZE+OFFSET); ctx.stroke();
        }
        ctx.fillStyle = "#bbb";
        for(let r=0; r<=GRID; r++) for(let c=0; c<=GRID; c++) { ctx.beginPath(); ctx.arc(c*SIZE+OFFSET, r*SIZE+OFFSET, 2, 0, 7); ctx.fill(); }
    }

    canvas.onclick = (e) => {
        if(!gameActive) return;
        if((myRole==='host' && currentPlayer!==1) || (myRole==='guest' && currentPlayer!==2)) return;
        const rect = canvas.getBoundingClientRect(), x = (e.clientX - rect.left) - OFFSET, y = (e.clientY - rect.top) - OFFSET;
        let rh = Math.round(y/SIZE), ch = Math.floor(x/SIZE), rv = Math.floor(y/SIZE), cv = Math.round(x/SIZE);
        let isH = Math.abs(y - rh*SIZE) < Math.abs(x - cv*SIZE);
        let r = isH ? rh : rv, c = isH ? ch : cv;
        if(handleMove(r, c, isH)) conn.send({type:'move', r, c, isH});
    };

    function handleMove(r, c, isH) {
        let hit = false, bonus = false;
        if(isH && r>=0 && r<=GRID && !hLines[r][c]) { hLines[r][c]=true; hit=true; if(checkSq(r,c)|checkSq(r-1,c)) bonus=true; }
        else if(!isH && c>=0 && c<=GRID && !vLines[r][c]) { vLines[r][c]=true; hit=true; if(checkSq(r,c)|checkSq(r,c-1)) bonus=true; }
        if(hit) { if(!bonus) currentPlayer = currentPlayer===1?2:1; updateUI(); draw(); return true; }
    }

    function checkSq(r, c) {
        if(r>=0 && r<GRID && c>=0 && c<GRID && hLines[r][c] && hLines[r+1][c] && vLines[r][c] && vLines[r][c+1] && !squares[r][c]) {
            squares[r][c] = currentPlayer; squares[r][c] = currentPlayer; scores[currentPlayer]++; 
            if(scores[1] + scores[2] === GRID*GRID) endGame(); return true;
        }
    }

    function updateUI() {
        const isMyTurn = (myRole==='host' && currentPlayer===1) || (myRole==='guest' && currentPlayer===2);
        const myS = scores[myRole==='host'?1:2], pS = scores[myRole==='host'?2:1];
        document.getElementById('my-score-val').innerText = myS;
        document.getElementById('peer-score-val').innerText = pS;
        document.getElementById('my-score-box').classList.toggle('active', isMyTurn);
        document.getElementById('peer-score-box').classList.toggle('active', !isMyTurn);
        document.getElementById('game-status').innerText = isMyTurn ? "LƯỢT BẠN" : `LƯỢT ${peerName.toUpperCase()}`;
    }

    function endGame(surrender = false) {
        gameActive = false;
        let myS = scores[myRole==='host'?1:2], pS = scores[myRole==='host'?2:1];
        let title = "🎮", text = "", win = 0, lose = 0;

        if(surrender) {
            title = "🏳️"; text = "ĐỐI THỦ ĐẦU HÀNG!"; win = 1;
        } else if(myS > pS) {
            title = "🏆"; text = "BẠN CHIẾN THẮNG!"; win = 1;
        } else if(myS < pS) {
            title = "💀"; text = "BẠN THẤT BẠI!"; lose = 1;
        } else {
            title = "🤝"; text = "TRẬN ĐẤU HÒA!";
        }

        document.getElementById('result-title').innerText = title;
        document.getElementById('result-text').innerText = text;
        document.getElementById('result-score').innerText = `${myS} - ${pS}`;
        document.getElementById('result-overlay').style.display = 'flex';
        
        save(win, lose);
    }

    function save(w, l) {
        let db = JSON.parse(localStorage.getItem('game_db') || '{}');
        db[myName].win += w; db[myName].lose += l;
        localStorage.setItem('game_db', JSON.stringify(db));
    }

    function confirmExit() { if(confirm("Bạn muốn đầu hàng?")) { if(conn) conn.send({type:'surrender'}); save(0,1); location.reload(); } }
    if(sessionStorage.getItem('user')) showMenu();
</script>
</body>
</html>
