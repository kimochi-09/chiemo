<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Chiếm Ô</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --p1: #ff4757; --p2: #2f3542; --primary: #2ed573; --danger: #ff4757; }
        body { margin: 0; display: flex; flex-direction: column; align-items: center; font-family: 'Segoe UI', sans-serif; background: #f1f2f6; color: #2f3542; overflow-x: hidden; }
        .container { width: 100%; max-width: 450px; padding: 10px; box-sizing: border-box; }
        .panel { background: white; padding: 12px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .tabs { display: flex; gap: 5px; margin-bottom: 10px; }
        .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; background: #dfe4ea; font-weight: bold; }
        .tab-btn.active { background: var(--primary); color: white; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; margin-bottom: 8px; outline: none; font-size: 16px; }
        button.main-btn { border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: var(--primary); color: white; padding: 12px; width: 100%; font-size: 16px; transition: 0.2s; }
        button.surrender-btn { background: var(--danger); }
        canvas { background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; height: auto; touch-action: none; cursor: crosshair; }
        .game-header { display: flex; justify-content: space-between; margin-bottom: 10px; gap: 10px; }
        .score-card { flex: 1; text-align: center; padding: 10px; border-radius: 10px; background: white; border: 2px solid #eee; transition: all 0.3s; }
        .active-turn { border-color: var(--primary) !important; background: #f0fff4 !important; }
    </style>
</head>
<body>

<div id="auth-screen" style="position:fixed; inset:0; background:white; z-index:1000; display:flex; align-items:center; justify-content:center;">
    <div class="panel" style="width:300px; text-align:center;">
        <h3>🎮 Chiếm Ô Online</h3>
        <input type="text" id="auth-user" placeholder="Tên đăng nhập">
        <input type="password" id="auth-pass" placeholder="Mật khẩu">
        <button class="main-btn" onclick="auth('login')">Đăng nhập</button>
        <button onclick="auth('reg')" style="background:none; border:none; margin-top:10px; font-size:13px; color:#666; cursor:pointer;">Chưa có tài khoản? Đăng ký</button>
    </div>
</div>

<div class="container" id="main-ui">
    <div class="panel" style="display:flex; justify-content: space-between; align-items: center;">
        <div>
            <div style="font-size: 14px;">Chào, <b id="display-name">...</b></div>
            <div style="font-size: 11px; color: #888;">ID: <span id="my-peer-id" style="color:var(--p1); font-weight:bold">Đang tạo...</span></div>
        </div>
        <button onclick="logout()" style="background:none; border:none; color:#ff4757; font-size:12px; cursor:pointer;">Thoát</button>
    </div>

    <div id="tab-play">
        <div class="panel">
            <input type="text" id="target-id" placeholder="Nhập ID đối thủ (5 số)...">
            <button id="main-action-btn" class="main-btn" onclick="manualConnect()">🎮 Chơi</button>
            <div id="game-status" style="text-align:center; font-size:12px; margin-top:8px; color:blue;">Sẵn sàng</div>
        </div>
        
        <div class="game-header">
            <div id="my-score-box" class="score-card">
                <div style="font-size:12px; color:var(--p1)" id="my-label">Bạn</div>
                <div id="my-score-val" style="font-size:24px; font-weight:bold">0</div>
            </div>
            <div id="peer-score-box" class="score-card">
                <div style="font-size:12px; color:var(--p2)" id="peer-label">Đối thủ</div>
                <div id="peer-score-val" style="font-size:24px; font-weight:bold">0</div>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const btnAction = document.getElementById('main-action-btn');
    const GRID = 8;
    let peer, conn, myName, myRole;
    let SIZE, OFFSET;
    let currentPlayer = 1, scores = { 1: 0, 2: 0 };
    let hLines, vLines, squares;

    // --- AUTH ---
    function auth(type) {
        const u = document.getElementById('auth-user').value.trim();
        const p = document.getElementById('auth-pass').value.trim();
        if(!u || !p) return alert("Thiếu thông tin!");
        let db = JSON.parse(localStorage.getItem('game_db') || '{}');
        if(type === 'reg') {
            if(db[u]) return alert("Tên đã tồn tại!");
            db[u] = { pass: p, friends: {}, lastId: null };
            localStorage.setItem('game_db', JSON.stringify(db));
            alert("Đăng ký thành công!");
        } else {
            if(db[u] && db[u].pass === p) {
                sessionStorage.setItem('user', u);
                location.reload();
            } else alert("Sai tài khoản hoặc mật khẩu!");
        }
    }

    if(sessionStorage.getItem('user')) {
        myName = sessionStorage.getItem('user');
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('display-name').innerText = myName;
        initPeer();
    }
    function logout() { sessionStorage.removeItem('user'); location.reload(); }

    // --- PEERJS ---
    function initPeer() {
        const shortId = Math.floor(10000 + Math.random() * 90000).toString();
        peer = new Peer(shortId); 
        peer.on('open', id => document.getElementById('my-peer-id').innerText = id);
        peer.on('error', err => { if(err.type === 'unavailable-id') initPeer(); });
        peer.on('connection', c => { 
            conn = c; 
            myRole = 'host'; 
            setupConn(); 
            updateBtnState('in-game');
        });
    }

    function manualConnect() {
        const id = document.getElementById('target-id').value.trim();
        if(id) { 
            conn = peer.connect(id); 
            myRole = 'guest'; 
            setupConn(); 
            updateBtnState('in-game');
        }
    }

    // Hàm thay đổi trạng thái nút
    function updateBtnState(state) {
        if(state === 'in-game') {
            btnAction.innerText = "🏳️ Đầu hàng";
            btnAction.classList.add('surrender-btn');
            btnAction.onclick = surrender;
        } else {
            btnAction.innerText = "🎮 Chơi";
            btnAction.classList.remove('surrender-btn');
            btnAction.onclick = manualConnect;
        }
    }

    function surrender() {
        if(confirm("Bạn có chắc chắn muốn đầu hàng không?")) {
            conn.send({ type: 'surrender' });
            alert("Bạn đã đầu hàng!");
            resetLocal();
            updateBtnState('lobby');
        }
    }

    function setupConn() {
        conn.on('open', () => {
            document.getElementById('game-status').innerText = "Đã kết nối!";
            conn.send({ type: 'name', name: myName });
            resetLocal();
        });
        conn.on('data', data => {
            if(data.type === 'name') document.getElementById('peer-label').innerText = data.name;
            if(data.type === 'move') handleMove(data.r, data.c, data.isH);
            if(data.type === 'reset') resetLocal();
            if(data.type === 'surrender') {
                alert("Đối thủ đã đầu hàng! Bạn thắng!");
                resetLocal();
                updateBtnState('lobby');
            }
        });
        conn.on('close', () => {
            alert("Kết nối đã ngắt.");
            updateBtnState('lobby');
        });
    }

    // --- GAME LOGIC GIỮ NGUYÊN TỪ BẢN TRƯỚC ---
    function initCanvas() {
        const displayWidth = canvas.clientWidth;
        canvas.width = displayWidth * window.devicePixelRatio; 
        canvas.height = displayWidth * window.devicePixelRatio;
        ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        SIZE = (displayWidth * 0.9) / GRID;
        OFFSET = (displayWidth - (SIZE * GRID)) / 2;
        draw();
    }

    function resetLocal() {
        currentPlayer = 1; scores = {1:0, 2:0};
        hLines = Array(GRID+1).fill().map(()=>Array(GRID).fill(false));
        vLines = Array(GRID).fill().map(()=>Array(GRID+1).fill(false));
        squares = Array(GRID).fill().map(()=>Array(GRID).fill(0));
        updateUI(); draw();
    }

    function draw() {
        const displayWidth = canvas.clientWidth;
        ctx.clearRect(0, 0, displayWidth, displayWidth);
        for (let r = 0; r < GRID; r++) {
            for (let c = 0; c < GRID; c++) {
                if (squares[r][c] !== 0) {
                    ctx.fillStyle = squares[r][c] === 1 ? 'rgba(255, 71, 87, 0.3)' : 'rgba(47, 53, 66, 0.3)';
                    ctx.fillRect(c * SIZE + OFFSET, r * SIZE + OFFSET, SIZE, SIZE);
                }
            }
        }
        ctx.lineWidth = 3;
        for (let r = 0; r <= GRID; r++) {
            for (let c = 0; c < GRID; c++) {
                ctx.strokeStyle = hLines[r][c] ? "#333" : "#f0f0f0";
                ctx.beginPath(); ctx.moveTo(c*SIZE+OFFSET, r*SIZE+OFFSET); ctx.lineTo((c+1)*SIZE+OFFSET, r*SIZE+OFFSET); ctx.stroke();
            }
        }
        for (let r = 0; r < GRID; r++) {
            for (let c = 0; c <= GRID; c++) {
                ctx.strokeStyle = vLines[r][c] ? "#333" : "#f0f0f0";
                ctx.beginPath(); ctx.moveTo(c*SIZE+OFFSET, r*SIZE+OFFSET); ctx.lineTo(c*SIZE+OFFSET, (r+1)*SIZE+OFFSET); ctx.stroke();
            }
        }
        ctx.fillStyle = "#ced4da";
        for (let r = 0; r <= GRID; r++) {
            for (let c = 0; c <= GRID; c++) {
                ctx.beginPath(); ctx.arc(c * SIZE + OFFSET, r * SIZE + OFFSET, 4, 0, Math.PI*2); ctx.fill();
            }
        }
    }

    canvas.addEventListener('mousedown', handleClick);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleClick(e.touches[0]); }, {passive: false});

    function handleClick(e) {
        if(!conn) return;
        if((myRole==='host' && currentPlayer!==1) || (myRole==='guest' && currentPlayer!==2)) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) - OFFSET;
        const y = (e.clientY - rect.top) - OFFSET;
        let rh = Math.round(y/SIZE), ch = Math.floor(x/SIZE);
        let rv = Math.floor(y/SIZE), cv = Math.round(x/SIZE);
        let distH = Math.abs(y - rh*SIZE), distV = Math.abs(x - cv*SIZE);
        let isH = distH < distV;
        let r = isH ? rh : rv, c = isH ? ch : cv;
        if(handleMove(r, c, isH)) conn.send({type:'move', r, c, isH});
    }

    function handleMove(r, c, isH) {
        let changed = false, bonus = false;
        if (isH) {
            if (r>=0 && r<=GRID && c>=0 && c<GRID && !hLines[r][c]) { hLines[r][c]=true; changed=true; if(checkSquare(r,c)|checkSquare(r-1,c)) bonus=true; }
        } else {
            if (r>=0 && r<GRID && c>=0 && c<=GRID && !vLines[r][c]) { vLines[r][c]=true; changed=true; if(checkSquare(r,c)|checkSquare(r,c-1)) bonus=true; }
        }
        if (changed) { if(!bonus) currentPlayer = (currentPlayer===1)?2:1; updateUI(); draw(); return true; }
        return false;
    }

    function checkSquare(r, c) {
        if (r < 0 || r >= GRID || c < 0 || c >= GRID) return false;
        if (hLines[r][c] && hLines[r+1][c] && vLines[r][c] && vLines[r][c+1]) {
            if (squares[r][c] === 0) { squares[r][c] = currentPlayer; scores[currentPlayer]++; return true; }
        }
        return false;
    }

    function updateUI() {
        const isMyTurn = (myRole === 'host' && currentPlayer === 1) || (myRole === 'guest' && currentPlayer === 2);
        document.getElementById('my-score-val').innerText = scores[myRole==='host'?1:2];
        document.getElementById('peer-score-val').innerText = scores[myRole==='host'?2:1];
        document.getElementById('my-score-box').className = 'score-card ' + (isMyTurn ? 'active-turn' : '');
        document.getElementById('peer-score-box').className = 'score-card ' + (!isMyTurn ? 'active-turn' : '');
        document.getElementById('game-status').innerText = isMyTurn ? "Đến lượt bạn!" : "Chờ đối thủ...";
    }

    window.addEventListener('resize', initCanvas);
    initCanvas();
    resetLocal();
</script>
</body>
</html>
